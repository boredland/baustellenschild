name: Crawl Baustellen Data

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:
    inputs:
      gemarkung:
        description: 'Gemarkung ID (e.g. 460). Leave empty for automatic batch selection.'
        required: false
        type: string
      flur:
        description: 'Flur number (e.g. 414). Requires gemarkung.'
        required: false
        type: string
      flurstueck:
        description: 'Flurstueck (e.g. 1/3). Requires gemarkung and flur.'
        required: false
        type: string

concurrency:
  group: crawl

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: |
          ARGS=""
          if [ -n "${{ inputs.gemarkung }}" ]; then
            ARGS="--gemarkung ${{ inputs.gemarkung }}"
            if [ -n "${{ inputs.flur }}" ]; then
              ARGS="$ARGS --flur ${{ inputs.flur }}"
              if [ -n "${{ inputs.flurstueck }}" ]; then
                ARGS="$ARGS --flurstueck ${{ inputs.flurstueck }}"
              fi
            fi
          fi
          uv run --no-cache python -u src/crawl.py $ARGS
        env:
          PYTHONUNBUFFERED: "1"
          CRAWL_CONCURRENCY: "200"
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/baustellen.json data/parcels_metadata.json debug/unexpected*.html
          git diff --cached --quiet || git commit -m "chore: update baustellen data $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)"
          git stash
          git pull --rebase
          git push
