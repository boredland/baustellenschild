name: Crawl Baustellen Data

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:        # manual trigger for testing

concurrency:
  group: crawl
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv run --no-cache python -u src/crawl.py
        env:
          PYTHONUNBUFFERED: "1"
          CRAWL_CONCURRENCY: "200"
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/baustellen.json
          git diff --cached --quiet || git commit -m "chore: update baustellen data $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)"
          git push
